<!-- @dsCard group="Colors" viewport="700x180" name="Semantic — esito & stato" subtitle="ok = brand green · warn amber · bad red · info blue, each with a soft bg" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--bg); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .pair { display: flex; height: 56px; border-radius: var(--r-card); overflow: hidden; border: 1px solid var(--rim); }
  .pair > div { flex: 1; }
  .nm { font-family: var(--font-body); font-size: var(--t-sm); font-weight: var(--w-medium); color: var(--ink); margin-top: 8px; }
  .vl { font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink-3); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="pair"><div style="background:var(--ok)"></div><div style="background:var(--ok-bg)"></div></div><div class="nm">--ok / -bg</div><div class="vl">superato</div></div>
    <div class="sw"><div class="pair"><div style="background:var(--warn)"></div><div style="background:var(--warn-bg)"></div></div><div class="nm">--warn / -bg</div><div class="vl">scaduta</div></div>
    <div class="sw"><div class="pair"><div style="background:var(--bad)"></div><div style="background:var(--bad-bg)"></div></div><div class="nm">--bad / -bg</div><div class="vl">non superato</div></div>
    <div class="sw"><div class="pair"><div style="background:var(--info)"></div><div style="background:var(--info-bg)"></div></div><div class="nm">--info / -bg</div><div class="vl">in corso</div></div>
  </div>
</body>
</html>
