<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 28px; font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
  .grid div { display: flex; justify-content: space-between; font-size: var(--t-md); color: var(--ink); padding: 4px 0; border-bottom: 1px solid var(--line); }
  .grid div span:first-child { font-family: var(--font-body); color: var(--ink-3); font-size: var(--t-sm); }
  .meta { font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink-3); margin-top: 14px; }
</style>
</head>
<body>
  <div class="grid">
    <div><span>Matricola</span><span>0312844</span></div>
    <div><span>CFU</span><span>168 / 180</span></div>
    <div><span>IUV</span><span>RF7320041558</span></div>
    <div><span>Media</span><span>27.4</span></div>
    <div><span>SSD</span><span>INF/01</span></div>
    <div><span>Importo</span><span>€ 156,00</span></div>
  </div>
  <div class="meta">Spline Sans Mono · tnum · -0.005em · right-aligned numerics</div>
</body>
</html>
