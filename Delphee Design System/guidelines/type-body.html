<!-- @dsCard group="Type" viewport="700x200" name="Body — Hanken Grotesk" subtitle="Warm grotesque workhorse: prose, labels, nav, buttons, table headers." -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-body); }
  .lead { font-size: var(--t-md); color: var(--ink); line-height: var(--lh-prose); max-width: 56ch; }
  .row { display: flex; gap: 18px; margin-top: 14px; align-items: baseline; }
  .row span { color: var(--ink); }
  .w4 { font-weight: 400; } .w5 { font-weight: 500; } .w6 { font-weight: 600; }
  .lbl { font-size: var(--t-sm); font-weight: 500; color: var(--ink-2); }
  .meta { font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink-3); margin-top: 14px; }
</style>
</head>
<body>
  <div class="lead">Dead-legible at 14px in dense tables, friendly at reading size. Labels are sentence case — no uppercase, no tracking.</div>
  <div class="row">
    <span class="w4" style="font-size:var(--t-lg)">Regular 400</span>
    <span class="w5" style="font-size:var(--t-lg)">Medium 500</span>
    <span class="w6" style="font-size:var(--t-lg)">Semibold 600</span>
  </div>
  <div class="meta">Hanken Grotesk · 400 body · 500 nav/active · 600 buttons/headings</div>
</body>
</html>
