<!-- @dsCard group="Brand" viewport="700x180" name="Logo & lockup" subtitle="Delphee delta mark + Fraunces wordmark. Mark tints to --brand via mask in dark." -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface); display: flex; gap: 40px; align-items: center; }
  .lockup { display: flex; align-items: center; gap: 12px; }
  .mark { width: 40px; height: 40px; }
  .name { font-family: var(--font-display); font-variation-settings: 'opsz' 24; font-weight: 600; font-size: var(--t-xl); color: var(--ink); line-height: 1.1; }
  .sub { font-family: var(--font-body); font-size: var(--t-sm); color: var(--ink-2); }
  .tile { background: var(--bg); padding: 18px 22px; border-radius: var(--r-card); border: 1px solid var(--line); }
  .dark { background: #15191e; }
  .dark .name { color: #e9edf2; }
  .dark .sub { color: #aab3bd; }
</style>
</head>
<body>
  <div class="tile">
    <div class="lockup">
      <img class="mark" src="../assets/delphee-mark.svg" alt="Delphee" />
      <div><div class="name">Delphee</div><div class="sub">Il tuo portale · Tor Vergata</div></div>
    </div>
  </div>
  <div class="tile dark" data-theme="dark">
    <div class="lockup">
      <img class="mark" src="../assets/delphee-mark.svg" alt="Delphee" />
      <div><div class="name">Delphee</div><div class="sub">Il tuo portale · Tor Vergata</div></div>
    </div>
  </div>
</body>
</html>
