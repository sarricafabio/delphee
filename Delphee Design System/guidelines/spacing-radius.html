<!-- @dsCard group="Spacing" viewport="700x150" name="Radius scale" subtitle="Softened toward squircle for the glass material" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface); font-family: var(--font-body); }
  .row { display: flex; gap: 20px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sq { width: 72px; height: 56px; background: var(--brand-soft); border: 1px solid var(--brand); }
  .tok { font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink); }
  .use { font-size: var(--t-2xs); color: var(--ink-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="sq" style="border-radius:5px"></div><div class="tok">r-chip · 5</div><div class="use">chips, badges</div></div>
    <div class="item"><div class="sq" style="border-radius:10px"></div><div class="tok">r-ctrl · 10</div><div class="use">buttons, inputs</div></div>
    <div class="item"><div class="sq" style="border-radius:14px"></div><div class="tok">r-card · 14</div><div class="use">cards, panels</div></div>
    <div class="item"><div class="sq" style="border-radius:20px"></div><div class="tok">r-modal · 20</div><div class="use">modals</div></div>
    <div class="item"><div class="sq" style="border-radius:9999px;width:56px"></div><div class="tok">r-full</div><div class="use">avatars</div></div>
  </div>
</body>
</html>
