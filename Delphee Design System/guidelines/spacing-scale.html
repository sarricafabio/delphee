<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale — 4px base" subtitle="Vary the steps; never pad every block by the same amount" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface); font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--brand); border-radius: 3px; width: 100%; }
  .box { width: 38px; display:flex; flex-direction:column; align-items:center; }
  .tok { font-family: var(--font-mono); font-size: var(--t-2xs); color: var(--ink-3); }
  .px { font-family: var(--font-mono); font-size: var(--t-2xs); color: var(--ink); }
</style>
</head>
<body>
  <div class="row">
    <div class="box"><div class="bar" style="height:4px"></div><div class="tok">sp-1</div><div class="px">4</div></div>
    <div class="box"><div class="bar" style="height:8px"></div><div class="tok">sp-2</div><div class="px">8</div></div>
    <div class="box"><div class="bar" style="height:12px"></div><div class="tok">sp-3</div><div class="px">12</div></div>
    <div class="box"><div class="bar" style="height:16px"></div><div class="tok">sp-4</div><div class="px">16</div></div>
    <div class="box"><div class="bar" style="height:24px"></div><div class="tok">sp-5</div><div class="px">24</div></div>
    <div class="box"><div class="bar" style="height:32px"></div><div class="tok">sp-6</div><div class="px">32</div></div>
    <div class="box"><div class="bar" style="height:48px"></div><div class="tok">sp-7</div><div class="px">48</div></div>
    <div class="box"><div class="bar" style="height:64px"></div><div class="tok">sp-8</div><div class="px">64</div></div>
  </div>
</body>
</html>
