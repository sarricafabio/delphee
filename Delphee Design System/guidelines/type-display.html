<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .hero { font-family: var(--font-display); font-variation-settings: 'opsz' 144, 'SOFT' 0; font-weight: 400; font-size: var(--t-3xl); color: var(--ink); letter-spacing: -0.015em; line-height: var(--lh-heading); }
  .hero em { font-style: italic; color: var(--brand-text); }
  .title { font-family: var(--font-display); font-variation-settings: 'opsz' 24; font-weight: 600; font-size: var(--t-xl); color: var(--ink); margin-top: 10px; }
  .meta { font-family: var(--font-mono); font-size: var(--t-xs); color: var(--ink-3); margin-top: 12px; }
</style>
</head>
<body>
  <div class="hero">Bentornato, <em>Mario</em></div>
  <div class="title">La tua carriera</div>
  <div class="meta">Fraunces · opsz 9–144 · wght 300–700 · SOFT 0 · -0.015em at hero</div>
</body>
</html>
