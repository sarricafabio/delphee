<!-- @dsCard group="Brand" viewport="700x200" name="Material — tiles, wells, glass" subtitle="Liquid-glass depth: raised tile · recessed well · glass chrome · hero" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg); font-family: var(--font-body); }
  body::before { content:''; position:fixed; inset:0; z-index:-1; background: var(--ambient); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .cell { display: flex; flex-direction: column; gap: 8px; }
  .tile { height: 72px; border-radius: var(--r-card); display:flex; align-items:center; justify-content:center; color: var(--ink-3); font-size: var(--t-xs); }
  .raised { background: linear-gradient(180deg, var(--sheen-top), var(--sheen-bot)); border: 1px solid var(--rim); box-shadow: var(--elev-1), var(--edge-hi); }
  .well { background: var(--surface); border: 1px solid var(--line-strong); box-shadow: var(--well); }
  .glass { background: var(--glass); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--rim); box-shadow: var(--elev-2), var(--edge-hi); }
  .hero { background: linear-gradient(180deg, var(--brand-soft), var(--surface)); border: 1px solid var(--rim); box-shadow: var(--elev-2), var(--edge-hi); color: var(--brand-text); font-weight: 600; }
  .nm { font-family: var(--font-mono); font-size: var(--t-2xs); color: var(--ink-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="tile raised">cards · tables</div><div class="nm">raised tile · elev-1</div></div>
    <div class="cell"><div class="tile well">inputs · trays</div><div class="nm">recessed well</div></div>
    <div class="cell"><div class="tile glass">sidebar · toast</div><div class="nm">glass chrome · blur 20</div></div>
    <div class="cell"><div class="tile hero">riepilogo</div><div class="nm">hero tile · elev-2</div></div>
  </div>
</body>
</html>
